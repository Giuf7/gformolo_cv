<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Giuseppe Formolo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window">

  <div class="titlebar">
    <div class="tab-title">giuseppe@formolo: ~ — bash — 134×40</div>
    <div class="win-buttons">
      <span class="win-btn btn-min">−</span>
      <span class="win-btn btn-max">□</span>
      <span class="win-btn btn-close">×</span>
    </div>
  </div>

  <div class="term" id="term">
    <div class="term-output" id="term-output">
      <div id="output"></div>
    </div>
    <div class="input-row">
      <span class="p-user">giuseppe</span><span class="p-at">@</span><span class="p-host">formolo</span><span class="p-colon">:</span><span class="p-path">~</span><span class="p-dollar">$</span>
      <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

</div>

<script src="terminal.js"></script>
</body>
</html>
